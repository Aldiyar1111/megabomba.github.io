<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Aldiyar Duisenaly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="tech-theme">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom border-bottom border-secondary">
            <div class="container">
                <a class="navbar-brand text-accent tech-font fw-bold" href="index.html">> Aldiyar_</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav ms-auto tech-font">
                        <li class="nav-item"><a class="nav-link" href="index.html">01. Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">02. About Me</a></li>
                        <li class="nav-item"><a class="nav-link active text-accent" href="contact.html">03. Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 fade-in-up">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card custom-card p-4 p-md-5">
                    <h2 class="tech-font text-accent text-center mb-4">> Initialize_Connection</h2>
                    
                    <form onsubmit="event.preventDefault();" class="text-light">
                        <div class="mb-3">
                            <label for="nameInput" class="form-label tech-font">Name</label>
                            <input type="text" class="form-control" id="nameInput" placeholder="Enter your name" required>
                        </div>
                        <div class="mb-3">
                            <label for="emailInput" class="form-label tech-font">Email</label>
                            <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="messageInput" class="form-label tech-font">Message Data</label>
                            <textarea class="form-control" id="messageInput" rows="4" placeholder="Type your message here..." required></textarea>
                        </div>
                        
                        <div class="text-center">
                            <button type="button" class="btn btn-neon px-5 py-2 fw-bold" data-bs-toggle="modal" data-bs-target="#successModal">
                                Transmit Data
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-custom text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title tech-font text-accent">System Message</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Packet successfully transmitted! I will process your message and respond to your email shortly.</p>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-neon" data-bs-dismiss="modal">Close Connection</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark-custom text-center py-4 border-top border-secondary mt-auto">
        <div class="container text-muted small">
            <a href="mailto:240374@astanait.edu.kz" class="text-accent text-decoration-none d-block mb-2">240374@astanait.edu.kz</a>
            &copy; 2026 Aldiyar Duisenaly · Midterm Project
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
